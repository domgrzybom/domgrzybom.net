<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DG.N icy-muzyka</title>
<style>
:root {
  --base-font-size: 18px;
}

/* Czcionka */
@font-face {
  font-family: "AcPlus_IBM_VGA";
  src: url('AcPlus_IBM_VGA_8x16.ttf') format("truetype");
}

/* GLOBAL */
body, button, strong, h1 {
  font-family: "AcPlus_IBM_VGA", monospace;
  font-size: var(--base-font-size);
  margin: 0;
}

body {
  background-color: #000;
  color: #ffe09c;
  padding: 0;
  background-image: url('animacja.gif');
  background-repeat: no-repeat;
  background-position: right 175px top 40px;
  background-attachment: scroll;
  image-rendering: pixelated;
}

/* ===== BANER ===== */
.banner-top {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

.banner-top img {
  width: 256px;
  height: 128px;
  image-rendering: pixelated;
}

/* ===== HOME BUTTON ===== */
.home-button {
  display: inline-block;
  padding: 2px 6px;
  font-size: 0.9em;
  max-width: 200px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  background: #ffe09c;
  color: black;
  border: 2px solid #fff;
  border-right-color: #404040;
  border-bottom-color: #404040;
  cursor: pointer;
  margin-bottom: 20px;
}

.home-button:active {
  border: 2px solid #404040;
  border-right-color: #fff;
  border-bottom-color: #fff;
}

/* PRZYCISKI 3D */
button {
  padding: 2px 8px;
  background: #ffe09c;
  color: black;
  border: 2px solid #fff;
  border-right-color: #404040;
  border-bottom-color: #404040;
  cursor: pointer;
}

button:active {
  border: 2px solid #404040;
  border-right-color: #fff;
  border-bottom-color: #fff;
}

/* ===== ODTWARZACZ ===== */
.player {
  width: 420px;
  border: 2px solid #ffe09c;
  padding: 10px;
  margin-bottom: 20px;
}

#track-name {
  margin-bottom: 10px;
  color: #80ff80;
}

.controls {
  margin-bottom: 10px;
}

.progress-container {
  display: flex;
  height: 20px;
  border: 2px solid #808080;
  cursor: pointer;
  margin-bottom: 5px;
}

.progress-segment {
  height: 100%;
  flex-shrink: 0;
}

#progress-time {
  color: #ffe09c;
  font-size: 0.9em;
  margin-bottom: 10px;
}

/* GŁOŚNOŚĆ */
.volume-container {
  display: flex;
  align-items: center;
  margin-top: 10px;
}

.volume-container input[type="range"] {
  -webkit-appearance: none;
  width: 150px;
  height: 12px;
  background: #000;
  border: 2px solid #ffe09c;
  outline: none;
  margin-right: 5px;
}

.volume-container input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  background: #ffe09c;
  border: 2px solid #fff;
  border-right-color: #404040;
  border-bottom-color: #404040;
}

.volume-container input[type="range"]::-moz-range-thumb {
  width: 12px;
  height: 12px;
  background: #ffe09c;
  border: 2px solid #fff;
  border-right-color: #404040;
  border-bottom-color: #404040;
}

/* LISTA UTWORÓW */
.song {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 400px;
  border: 2px solid #ffe09c;
  padding: 10px;
  margin-bottom: 10px;
}

/* RESPONSYWNOŚĆ */
@media (max-width: 600px) {
  .player, .song {
    width: 90%;
  }
  .home-button {
    max-width: 150px;
    font-size: 0.9em;
  }
}
</style>
</head>

<body>
<div class="banner-top">
  <img src="dgnBaner.jpg" alt="baner">
</div>

<div class="content">
  <button class="home-button" onclick="location.href='../'">
    zaznanie aktu powrotu do przedpokoju domu grzybomu
  </button>

  <h1 style="color:#80ff80;">odtworzyciel plików mp3</h1>

  <div class="player">
    <div id="track-name">zapodaj nośnik z utworem na odtwarzacz</div>
    <div class="controls">
      <button onclick="play()">graj</button>
      <button onclick="pause()">pauza</button>
      <button onclick="stop()">zeruj</button>
      <button onclick="download()">ściągnij mp3 ZA DARMOCHĘ</button>
    </div>
    <div class="progress-container" id="progress-container" onclick="seek(event)"></div>
    <div id="progress-time">0:00 / 0:00</div>
    <div class="volume-container">
      <span style="margin-right:5px;">głośność</span>
      <input type="range" min="0" max="1" step="0.01" value="1" onchange="setVolume(this.value)" id="volume-slider">
      <span id="volume-value">100%</span>
    </div>
  </div>

  <h1 style="color:#80ff80;">półki szafy pełnej tworów muzycznych,</h1>
  <h1 style="color:#80ff80;">poszukaj czegoś dla siebie przybyszu</h1>

  <div id="song-list"></div>
</div>

<script>
const audio = new Audio()
let currentFile = ""

// Odtwarzacz
function play(){ audio.play() }
function pause(){ audio.pause() }
function stop(){ audio.pause(); audio.currentTime = 0 }
function setVolume(v){
  audio.volume = v
  document.getElementById("volume-value").innerText = Math.round(v*100)+"%"
}
function download(){
  if(!currentFile) return
  const a=document.createElement("a")
  a.href=currentFile
  a.download=""
  a.click()
}

// Aktualizacja paska czasu
function updateProgress(){
  const container=document.getElementById("progress-container")
  container.innerHTML=""
  if(audio.duration){
    const totalSegments=50
    const gap=2
    const segmentWidth=(container.clientWidth-gap*(totalSegments-1))/totalSegments
    for(let i=0;i<totalSegments;i++){
      const seg=document.createElement("div")
      seg.className="progress-segment"
      seg.style.width=segmentWidth+"px"
      seg.style.marginRight=(i<totalSegments-1?gap+"px":"0")
      seg.style.background=i<Math.round(totalSegments*(audio.currentTime/audio.duration))?"#ffe09c":"#000"
      container.appendChild(seg)
    }
  }
  const cm=Math.floor(audio.currentTime/60)
  const cs=Math.floor(audio.currentTime%60).toString().padStart(2,'0')
  const dm=Math.floor(audio.duration/60)||0
  const ds=Math.floor(audio.duration%60).toString().padStart(2,'0')
  document.getElementById("progress-time").innerText=`${cm}:${cs} / ${dm}:${ds}`
}

audio.ontimeupdate=updateProgress

function seek(e){
  const container=document.getElementById("progress-container")
  const rect=container.getBoundingClientRect()
  const percent=(e.clientX-rect.left)/rect.width
  audio.currentTime=percent*audio.duration
}

// Lista utworów
fetch("lista.json")
.then(r=>r.json())
.then(files=>{
  files.reverse()
  const list=document.getElementById("song-list")
  files.forEach(file=>{
    const div=document.createElement("div")
    div.className="song"
    div.innerHTML=`<strong>${file}</strong>
      <button onclick="loadTrack('pliki_mp3/${file}')">zapodaj na odtwarzacz</button>`
    list.appendChild(div)
  })
})

function loadTrack(file){
  currentFile=file
  audio.src=file
  document.getElementById("track-name").innerText=file.replace("pliki_mp3/","")
  audio.play()
}
</script>
</body>
</html>
