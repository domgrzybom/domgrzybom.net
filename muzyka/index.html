<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pobieranie MP3</title>
<script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>

<style>

/* 🔥 Zmieniaj tylko tutaj */
:root {
  --base-font-size: 18px;
}

/* Czcionka */
@font-face {
  font-family: "AcPlus_IBM_VGA";
  src: url('AcPlus_IBM_VGA_8x16.ttf') format("truetype");
  font-display: block;
}

/* GLOBAL */
body, button, strong, .status, h1 {
  font-family: "AcPlus_IBM_VGA", monospace;
  font-size: var(--base-font-size);
  -webkit-font-smoothing: none;
  font-smooth: never;
}

body {
  background-color: #000;
  color: #ffe09c;
  padding: 20px;
  margin: 0;

  /* GIF jako fixed tło po prawej */
  background-image: url('animacja.gif');
  background-repeat: no-repeat;
  background-position: calc(100% - 80px) 40px;
  background-attachment: fixed;
  background-size: auto;
}

/* Układ okienek piosenek */
#song-list {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

/* OKIENKO 4:3 */
.song {
  width: 400px;
  height: 300px;
  background: #000000;
  border: 2px solid #ffe09c;
  padding: 10px;
  margin-bottom: 20px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  position: relative;
}

/* PRZYCISKI 3D */
button {
  padding: 2px 8px;
  background: #ffe09c;
  color: black;
  border: 2px solid #fff;
  border-right-color: #404040;
  border-bottom-color: #404040;
  cursor: pointer;
  margin-top: 10px;
  display: inline-block;
}

button:active {
  border: 2px solid #404040;
  border-right-color: #fff;
  border-bottom-color: #fff;
}

/* Mały przycisk zapisu */
.save-button {
  position: absolute;
  bottom: 10px;
  left: 10px;
  padding: 2px 6px;
  font-size: 0.9em;
}

/* Pasek postępu */
.progress-container {
  display: none;
  margin-top: 15px;
  width: 100%;
  height: 20px;
  background: #000;
  border: 2px solid #808080;
  box-sizing: border-box;
  padding: 2px;
}

.progress-bar {
  display: flex;
  height: 100%;
}

.progress-segment {
  background: #ffe09c;
  height: 100%;
  flex-shrink: 0;
}

.status {
  margin-top: 8px;
  white-space: pre-line;
  color: #00ff00;
}

</style>
</head>

<body>

<h1 style="color:#00ff00;">lista tworów muzycznych</h1>
<div id="song-list"></div>

<script>
const client = new WebTorrent()

const songs = [
  { title: "prypeć", magnet: "magnet:?xt=urn:btih:c46eda58ebe7ba395d516e3c6c967ec38c7af337&dn=prypec+remake.mp3&tr=wss://tracker.btorrent.xyz&tr=wss://tracker.openwebtorrent.com" },
  { title: "Piosenka 2", magnet: "magnet:?xt=urn:btih:TU_HASH_2" },
  { title: "Piosenka 3", magnet: "magnet:?xt=urn:btih:TU_HASH_3" }
]

const list = document.getElementById("song-list")

songs.forEach((song, i) => {

  const div = document.createElement("div")
  div.className = "song"

  div.innerHTML = `
    <strong>${song.title}</strong>
    <button id="btn-${i}">ściągnij za darmochę</button>

    <div class="progress-container" id="pc-${i}">
      <div class="progress-bar" id="pb-${i}"></div>
    </div>

    <div class="status" id="status-${i}"></div>
  `

  list.appendChild(div)

  document.getElementById(`btn-${i}`).onclick = () => {

    if (!song.magnet) {
      alert("Brak magnet linku!")
      return
    }

    const status = document.getElementById(`status-${i}`)
    const progressContainer = document.getElementById(`pc-${i}`)
    const progressBar = document.getElementById(`pb-${i}`)

    progressContainer.style.display = "block"
    progressBar.innerHTML = ""
    status.innerText = "Łączenie z siecią..."

    client.add(song.magnet, {
      announce: [
        'wss://tracker.openwebtorrent.com',
        'wss://tracker.btorrent.xyz'
      ],
      dht: false,
      lsd: false
    }, torrent => {

      const totalSegments = 50

      const interval = setInterval(() => {

        const percent = torrent.progress
        const filledSegments = Math.round(totalSegments * percent)

        const containerWidth = progressContainer.clientWidth - 4
        const segmentGap = 2
        const segmentWidth =
          (containerWidth - (totalSegments-1)*segmentGap)/totalSegments

        progressBar.innerHTML = ""

        for (let s=0; s<filledSegments; s++){
          const seg = document.createElement("div")
          seg.className = "progress-segment"
          seg.style.width = segmentWidth + "px"
          seg.style.marginRight =
            (s < totalSegments-1 ? segmentGap + "px" : "0")
          progressBar.appendChild(seg)
        }

        status.innerText =
`Progres: ${(percent*100).toFixed(1)} %
Pobrano: ${(torrent.downloaded/1024/1024).toFixed(2)} MB
Prędkość: ${(torrent.downloadSpeed/1024).toFixed(2)} KB/s`

      }, 500)

      torrent.on('done', () => {
        clearInterval(interval)
        status.innerText += "\n\nprzetwarzanie ukończone"

        torrent.files.forEach(file => {
          file.getBlobURL((err, url) => {

            const saveBtn = document.createElement("button")
            saveBtn.className = "save-button"
            saveBtn.textContent = "zapisz plik"

            saveBtn.onclick = () => {
              const a = document.createElement("a")
              a.href = url
              a.download = file.name
              a.click()
            }

            div.appendChild(saveBtn)
          })
        })
      })

    })
  }

})
</script>

</body>
</html>
