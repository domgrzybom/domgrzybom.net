<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DG.N icy-muzyka</title>

<style>
:root {
  --base-font-size: 18px;
}

/* Czcionka */
@font-face {
  font-family: "AcPlus_IBM_VGA";
  src: url('AcPlus_IBM_VGA_8x16.ttf') format("truetype");
}

/* GLOBAL */
body, button, strong, h1 {
  font-family: "AcPlus_IBM_VGA", monospace;
  font-size: var(--base-font-size);
  margin: 0;
}

body {
  background-color: #000;
  color: #ffe09c;
  padding: 20px;
  background-image: url('animacja.gif');
  background-repeat: no-repeat;
  background-position: calc(100% - 80px) 40px;
  background-attachment: fixed;
}

/* ===== GÓRNY PANEL ===== */
.top-bar {
  position: relative;
  width: 100%;
  margin-bottom: 20px;
}

.banner {
  text-align: center;
}

.banner img {
  max-width: 100%;
  height: 80px; /* niski baner */
  object-fit: cover;
}

.home-button {
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  padding: 2px 6px;
  font-size: 0.9em;
  background: #ffe09c;
  color: black;
  border: 2px solid #fff;
  border-right-color: #404040;
  border-bottom-color: #404040;
  cursor: pointer;
}

.home-button:active {
  border: 2px solid #404040;
  border-right-color: #fff;
  border-bottom-color: #fff;
}

/* PRZYCISKI 3D */
button {
  padding: 2px 8px;
  background: #ffe09c;
  color: black;
  border: 2px solid #fff;
  border-right-color: #404040;
  border-bottom-color: #404040;
  cursor: pointer;
}

button:active {
  border: 2px solid #404040;
  border-right-color: #fff;
  border-bottom-color: #fff;
}

/* ===== ODTWARZACZ ===== */
.player {
  width: 420px;
  border: 2px solid #ffe09c;
  padding: 10px;
  margin-bottom: 20px;
}

#track-name {
  margin-bottom: 10px;
  color: #00ff00;
}

.controls {
  margin-bottom: 10px;
}

.progress-container {
  display: flex;
  height: 20px;
  border: 2px solid #808080;
  cursor: pointer;
  margin-bottom: 5px;
}

.progress-segment {
  height: 100%;
  flex-shrink: 0;
}

#progress-time {
  color: #00ff00;
  font-size: 0.9em;
  margin-bottom: 10px;
}

/* Volume */
.volume-container {
  display: flex;
  align-items: center;
  margin-top: 10px;
}

.volume-container input[type="range"] {
  -webkit-appearance: none;
  width: 150px;
  height: 12px;
  background: #000;
  border: 2px solid #ffe09c;
  outline: none;
  margin-right: 5px;
}

.volume-container input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  background: #ffe09c;
  border: 2px solid #fff;
  border-right-color: #404040;
  border-bottom-color: #404040;
  cursor: pointer;
}

.volume-container input[type="range"]::-moz-range-thumb {
  width: 12px;
  height: 12px;
  background: #ffe09c;
  border: 2px solid #fff;
  border-right-color: #404040;
  border-bottom-color: #404040;
  cursor: pointer;
}

/* ===== LISTA UTWORÓW ===== */
.song {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 400px;
  border: 2px solid #ffe09c;
  padding: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="top-bar">
  <button class="home-button" onclick="location.href='../'">
    zaznanie powrotu do przedpokoju domu grzybomu
  </button>
  <div class="banner">
    <img src="../baner.png" alt="<baner w budowie>">
  </div>
</div>
<h1 style="color:#00ff00;">lista tworów muzycznych</h1>
<!-- ODTWARZACZ -->
<div class="player">
  <div id="track-name">zapodaj nośnik z utworem na odtwarzacz</div>

  <div class="controls">
    <button onclick="play()">graj</button>
    <button onclick="pause()">pauza</button>
    <button onclick="stop()">zeruj</button>
    <button onclick="download()">ściągnij mp3 ZA DARMOCHĘ</button>
  </div>

  <div class="progress-container" id="progress-container" onclick="seek(event)"></div>
  <div id="progress-time">0:00 / 0:00</div>

  <div class="volume-container">
    <span style="color:#ffe09c; margin-right:5px;">głośność</span>
    <input type="range" min="0" max="1" step="0.01" value="1" onchange="setVolume(this.value)" id="volume-slider">
    <span id="volume-value" style="color:#ffe09c;">100%</span>
  </div>
</div>

<h1 style="color:#00ff00;">lista tworów muzycznych</h1>

<div id="song-list"></div>

<script>
const audio = new Audio()
let currentFile = ""

// odtwarzacz
function play(){ audio.play() }
function pause(){ audio.pause() }
function stop(){ audio.pause(); audio.currentTime = 0 }
function setVolume(v){
  audio.volume = v
  document.getElementById("volume-value").innerText = Math.round(v*100)+"%"
}
function download(){
  if(!currentFile) return
  const a = document.createElement("a")
  a.href = currentFile
  a.download = ""
  a.click()
}

// aktualizacja paska czasu
function updateProgress(){
  const container = document.getElementById("progress-container")
  container.innerHTML=""
  if(audio.duration){
    const totalSegments = 50
    const gap = 2
    const segmentWidth = (container.clientWidth - gap*(totalSegments-1)) / totalSegments

    for(let i=0;i<totalSegments;i++){
      const seg = document.createElement("div")
      seg.className="progress-segment"
      seg.style.width = segmentWidth + "px"
      seg.style.marginRight = (i<totalSegments-1? gap+"px":"0")
      if(i < Math.round(totalSegments * (audio.currentTime/audio.duration))){
        seg.style.background="#ffe09c"
      } else {
        seg.style.background="#000"
      }
      container.appendChild(seg)
    }
  }

  const curMin = Math.floor(audio.currentTime/60)
  const curSec = Math.floor(audio.currentTime%60).toString().padStart(2,'0')
  const durMin = Math.floor(audio.duration/60) || 0
  const durSec = Math.floor(audio.duration%60).toString().padStart(2,'0')
  document.getElementById("progress-time").innerText = `${curMin}:${curSec} / ${durMin}:${durSec}`
}

audio.ontimeupdate = updateProgress

function seek(e){
  const container = document.getElementById("progress-container")
  const rect = container.getBoundingClientRect()
  const percent = (e.clientX - rect.left)/rect.width
  audio.currentTime = percent * audio.duration
}

// lista utworów
fetch("lista.json")
.then(r => r.json())
.then(files => {
  files.reverse()
  const list = document.getElementById("song-list")
  files.forEach(file => {
    const div = document.createElement("div")
    div.className = "song"
    div.innerHTML = `<strong>${file}</strong> <button onclick="loadTrack('pliki_mp3/${file}')">zapodaj na odtwarzacz</button>`
    list.appendChild(div)
  })
})

// ładowanie utworu
function loadTrack(file){
  currentFile = file
  audio.src = file
  document.getElementById("track-name").innerText = file.replace("pliki_mp3/","")
  audio.play()
}
</script>

</body>
</html>
